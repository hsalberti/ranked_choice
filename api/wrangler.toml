# The 2028 Ballot — Cloudflare Worker config.
#
# Phase 1+ ships /api/health, /api/event, /api/vote, /api/stats,
# /api/ballot, /api/leaderboard/:country, /api/comparison/:country.
# Phase 5 layers Turnstile + KV rate-limiting on top.
#
# Before first deploy: `wrangler login`, then
# `wrangler d1 create ranked-choice-db` and paste the printed database_id
# into the `database_id` field below.

name = "ranked-choice-api"
main = "src/index.ts"
compatibility_date = "2026-05-17"
compatibility_flags = ["nodejs_compat_v2"]

# account_id is read from CLOUDFLARE_ACCOUNT_ID env var (set as a GH
# Actions secret + locally via `wrangler login`).
# account_id = "..."

# Once the custom domain is on Cloudflare DNS, attach a Worker route:
# routes = [
#   { pattern = "api.2028ballot.almaintel.com/*", zone_name = "almaintel.com" },
# ]

[observability]
enabled = true

# ----- D1 (Phase 1.5+/2+) --------------------------------------------
# `wrangler dev` uses a local SQLite file under .wrangler/ until you
# pair this binding to a real D1. Production needs:
#   wrangler d1 create ranked-choice-db
#   (paste the returned UUID into database_id below, uncomment, push)
[[d1_databases]]
binding        = "DB"
database_name  = "ranked-choice-db"
database_id    = "ranked-choice-db-local"
migrations_dir = "../migrations"

# ----- KV (Phase 5) --------------------------------------------------
# Rate-limit storage; per-IP daily slots keyed by sha256(ip + DAILY_SALT).
# [[kv_namespaces]]
# binding = "KV"
# id      = "TODO-from-wrangler-kv-namespace-create"

# ----- Secrets (Phase 5) ---------------------------------------------
# Set via `wrangler secret put TURNSTILE_SECRET` and similar.
